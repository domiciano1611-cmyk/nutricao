<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nutrition | Future Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            background: radial-gradient(circle at 20% 30%, #2e1065 0%, #0f172a 100%);
            padding: 20px;
            color: white;
            overflow: hidden;
        }

        /* Efeitos de luz de fundo idênticos à imagem */
        .bg-glow {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
        }

        /* CONTAINER PRINCIPAL HORIZONTAL */
        .glass-panel {
            width: 100%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 30px;
            display: flex;
            padding: 30px;
            gap: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        /* LADO ESQUERDO: FORMULÁRIO */
        .form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
        }

        button {
            margin-top: auto;
            padding: 15px;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 12px;
            font-weight: 800;
            color: #0f172a;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* LADO DIREITO: RESULTADO */
        .result-side {
            flex: 1.5;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .meal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .meal-info { flex: 1; }
        .meal-info h4 { color: var(--primary); font-size: 1.1rem; margin-bottom: 5px; }
        .meal-info p { font-size: 0.9rem; color: #cbd5e1; }

        .meal-img {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            object-fit: cover;
            border: 2px solid var(--border);
            margin-left: 15px;
        }

        h2 { font-size: 1.5rem; margin-bottom: 20px; }
        
        #loader { display: none; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: 10%; left: 10%; background: #00f2fe;"></div>
    <div class="bg-glow" style="bottom: 10%; right: 10%; background: #fdbb2d;"></div>

    <div class="glass-panel">
        <div class="form-side">
            <h2>AI Nutrition</h2>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Ex: Alex Santana">
            </div>
            
            <div class="input-row">
                <div class="form-group">
                    <label>Idade</label>
                    <input type="number" id="idade" placeholder="28">
                </div>
                <div class="form-group">
                    <label>Gênero</label>
                    <select id="genero">
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>
            </div>

            <div class="input-row">
                <div class="form-group">
                    <label>Peso Atual</label>
                    <input type="text" id="peso" placeholder="80kg">
                </div>
                <div class="form-group">
                    <label>Meta</label>
                    <input type="text" id="meta" placeholder="70kg">
                </div>
            </div>

            <button onclick="generatePlan()">Gerar Plano</button>
        </div>

        <div class="result-side" id="result-area">
            <div id="welcome-msg">
                <h3>Aguardando seus dados...</h3>
                <p style="color: #94a3b8; font-size: 0.9rem;">Preencha o formulário para a IA criar seu plano visual.</p>
            </div>
            <div id="loader">Calculando dieta e buscando imagens...</div>
        </div>
    </div>

    <script>
        const API_KEY = "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";

        async function generatePlan() {
            const nome = document.getElementById('nome').value;
            const idade = document.getElementById('idade').value;
            const genero = document.getElementById('genero').value;
            const peso = document.getElementById('peso').value;
            const meta = document.getElementById('meta').value;
            const resultArea = document.getElementById('result-area');

            if (!nome) return alert("Preencha o nome.");

            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Pedimos para a IA retornar em um formato JSON simples para extrairmos os nomes dos alimentos
            const prompt = `Atue como nutricionista. Crie um plano de emagrecimento para ${nome}.
            Retorne EXATAMENTE neste formato de exemplo, sem texto extra:
            Café da Manhã: [Nome do prato principal aqui] | Descrição curta
            Almoço: [Nome do prato principal aqui] | Descrição curta
            Lanche: [Nome do prato principal aqui] | Descrição curta
            Jantar: [Nome do prato principal aqui] | Descrição curta`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.5
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;
                const lines = text.split('\n').filter(l => l.includes(':'));

                let htmlContent = `<h2>Plano de ${nome}</h2>`;

                for (let line of lines) {
                    const [meal, details] = line.split(':');
                    const [foodName, description] = details.split('|');
                    
                    // Busca imagem real no Unsplash baseada no nome do alimento
                    const imgUrl = `https://source.unsplash.com/400x400/?${encodeURIComponent(foodName.trim())},healthyfood`;

                    htmlContent += `
                        <div class="meal-item">
                            <div class="meal-info">
                                <h4>${meal.trim()}</h4>
                                <p><strong>${foodName.trim()}</strong></p>
                                <p style="font-size: 0.8rem; opacity: 0.7;">${description ? description.trim() : ''}</p>
                            </div>
                            <img src="${imgUrl}" class="meal-img" alt="food">
                        </div>
                    `;
                }

                document.getElementById('loader').style.display = 'none';
                resultArea.innerHTML = htmlContent;

            } catch (error) {
                alert("Erro ao gerar plano.");
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
