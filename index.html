<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg-body: #f8fafc;
            --bg-side: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            display: flex;
            min-height: 100vh;
            background-color: var(--bg-body);
            color: var(--text-main);
        }

        /* MENU LATERAL */
        aside {
            width: 260px;
            background: var(--bg-side);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
        }

        aside .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav ul { list-style: none; }
        nav li {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: #94a3b8;
        }
        nav li.active { background: var(--primary); color: white; }
        nav li:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        /* ÁREA PRINCIPAL */
        main {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 70px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* GRID DE LAYOUT */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
        }

        h3 { font-size: 1.1rem; margin-bottom: 20px; color: var(--text-main); }

        /* FORMULÁRIO CLEAN */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--primary-dark); }

        /* LISTA DE REFEIÇÕES */
        .meal-list { display: flex; flex-direction: column; gap: 20px; }
        .meal-item {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #edf2f7;
        }

        .meal-img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            background: #e2e8f0;
        }

        .meal-details h4 { color: var(--primary); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 4px; }
        .meal-details h5 { font-size: 1.1rem; margin-bottom: 6px; }
        .meal-details p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

        .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <aside>
        <div class="logo"><span>🥗</span> NutritionAI</div>
        <nav>
            <ul>
                <li class="active">Painel do Plano</li>
                <li>Pacientes</li>
                <li>Configurações</li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <div class="header-info"><strong>Gerador de Dieta v2.0</strong></div>
            <div class="user-profile">Nutricionista</div>
        </header>

        <div class="content">
            <div class="dashboard-grid">
                <div class="card">
                    <h3>Dados do Paciente</h3>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" placeholder="Ex: Andrea Ginaldo">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Peso (kg)</label>
                            <input type="number" id="peso" placeholder="74">
                        </div>
                        <div class="form-group">
                            <label>Meta (kg)</label>
                            <input type="number" id="meta" placeholder="68">
                        </div>
                    </div>
                    <button class="btn-primary" onclick="generatePlan()">Gerar Plano Profissional</button>
                </div>

                <div class="card">
                    <h3>Sugestão Alimentar</h3>
                    <div id="result-area">
                        <p style="color: var(--text-muted)">Preencha os dados à esquerda para criar o plano.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "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";

        // Mapeamento simples para melhorar a busca de imagens (PT -> EN)
        const translationMap = {
            "omelete": "omelette",
            "frango": "grilled chicken",
            "salada": "salad",
            "ovos": "eggs",
            "pão": "whole grain bread",
            "fruta": "fruit bowl",
            "iogurte": "yogurt",
            "peixe": "cooked fish",
            "carne": "steak beef",
            "arroz": "brown rice"
        };

        async function generatePlan() {
            const nome = document.getElementById('nome').value || "Paciente";
            const resultArea = document.getElementById('result-area');
            
            resultArea.innerHTML = `<div class="loading">Consultando IA e selecionando imagens reais...</div>`;

            const prompt = `Atue como nutricionista. Crie um plano de emagrecimento para ${nome}. 
            Retorne 4 refeições seguindo este formato rigoroso:
            Refeição: [Nome] | Alimento: [Nome do prato] | Detalhes: [Descrição curta]`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.5
                    })
                });

                const data = await response.json();
                const lines = data.choices[0].message.content.split('\n').filter(l => l.includes('|'));

                let htmlContent = `<div class="meal-list">`;

                for (let line of lines) {
                    const parts = line.split('|');
                    const mealType = parts[0].split(':')[1].trim();
                    const foodName = parts[1].split(':')[1].trim();
                    const details = parts[2].split(':')[1].trim();

                    // Melhorando a busca da imagem
                    let searchTag = foodName.toLowerCase();
                    for (const [pt, en] of Object.entries(translationMap)) {
                        if (searchTag.includes(pt)) { searchTag = en; break; }
                    }

                    // Usando Unsplash com Source dinâmico e palavras-chave em inglês para precisão
                    const imgUrl = `https://source.unsplash.com/400x400/?food,${searchTag.replace(/ /g, ",")}`;
                    
                    // Backup Caso Unsplash demore (LoremFlickr)
                    const fallbackImg = `https://loremflickr.com/400/400/food,${searchTag.replace(/ /g, ",")}/all`;

                    htmlContent += `
                        <div class="meal-item">
                            <img class="meal-img" src="${fallbackImg}" alt="${foodName}" 
                                 onerror="this.src='https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=400&q=80'">
                            <div class="meal-details">
                                <h4>${mealType}</h4>
                                <h5>${foodName}</h5>
                                <p>${details}</p>
                            </div>
                        </div>
                    `;
                }

                htmlContent += `</div>`;
                resultArea.innerHTML = htmlContent;

            } catch (error) {
                resultArea.innerHTML = `<p style="color: red">Erro ao processar. Tente novamente.</p>`;
            }
        }
    </script>
</body>
</html>
