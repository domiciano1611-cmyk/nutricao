<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nutrition | Future Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        /* PAINEL PRINCIPAL (GLASSMORPHISM) */
        .glass-panel {
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            padding: 40px;
            gap: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* LADO ESQUERDO: FORMULÁRIO */
        .form-side { flex: 1; display: flex; flex-direction: column; }
        h2 { font-size: 1.8rem; margin-bottom: 30px; font-weight: 800; }

        .form-group { margin-bottom: 20px; }
        .form-group label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; display: block; }

        input, select {
            width: 100%; padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white; font-size: 1rem;
            transition: 0.3s;
        }
        
        input:focus { border-color: #00f2fe; outline: none; background: rgba(255, 255, 255, 0.1); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-gerar {
            margin-top: auto; padding: 18px;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none; border-radius: 15px;
            font-weight: 800; color: #0f172a;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }

        .btn-gerar:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }

        /* LADO DIREITO: RESULTADOS */
        .result-side {
            flex: 1.5; background: rgba(0, 0, 0, 0.25);
            border-radius: 25px; padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 550px; overflow-y: auto;
        }

        .result-side::-webkit-scrollbar { width: 6px; }
        .result-side::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 10px; }

        .meal-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .meal-info { flex: 1; padding-right: 15px; }
        .meal-info h4 { color: #00f2fe; font-size: 1.1rem; margin-bottom: 5px; }
        .meal-info h5 { font-size: 1.2rem; margin-bottom: 8px; color: #fff; }
        .meal-info p { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }

        .meal-image-container {
            width: 130px; height: 130px; min-width: 130px;
            border-radius: 20px; overflow: hidden;
            border: 2px solid rgba(0, 242, 254, 0.2);
            background: #1a2233;
        }

        .meal-image-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .loading-text { text-align: center; color: #00f2fe; margin-top: 40%; font-weight: bold; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="form-side">
            <h2>AI Nutrition</h2>
            
            <div class="form-group">
                <label>Nome do Paciente</label>
                <input type="text" id="nome" placeholder="Andrea Ginaldo">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Idade</label>
                    <input type="number" id="idade" placeholder="47">
                </div>
                <div class="form-group">
                    <label>Gênero</label>
                    <select id="genero">
                        <option value="Feminino">Feminino</option>
                        <option value="Masculino">Masculino</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Peso Atual (kg)</label>
                    <input type="number" id="peso" placeholder="74">
                </div>
                <div class="form-group">
                    <label>Meta (kg)</label>
                    <input type="number" id="meta" placeholder="68">
                </div>
            </div>

            <button class="btn-gerar" onclick="generatePlan()">Gerar Plano</button>
        </div>

        <div class="result-side" id="result-area">
            <h3 id="result-title">Aguardando dados...</h3>
            <p style="color:#64748b; margin-top: 20px;">Preencha o formulário para visualizar sua dieta inteligente com fotos reais.</p>
        </div>
    </div>

    <script>
        const API_KEY = "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";

        async function generatePlan() {
            const nome = document.getElementById('nome').value || "Paciente";
            const resultArea = document.getElementById('result-area');
            
            // Feedback visual de carregamento
            resultArea.innerHTML = `<div class="loading-text">IA analisando perfil e buscando fotos...</div>`;

            const prompt = `Atue como nutricionista. Crie um plano de emagrecimento para ${nome}. 
            Retorne APENAS 4 refeições seguindo RIGOROSAMENTE este formato:
            Refeição: [Nome] | Alimento: [Nome curto do prato em Português] | Detalhes: [Breve descrição]`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;
                const lines = text.split('\n').filter(l => l.includes('|'));

                let htmlContent = `<h3>Plano de ${nome}</h3>`;

                for (let line of lines) {
                    const parts = line.split('|');
                    const mealType = parts[0].split(':')[1].trim();
                    const foodName = parts[1].split(':')[1].trim();
                    const details = parts[2].split(':')[1].trim();

                    // TRUQUE PARA IMAGEM SEMPRE APARECER:
                    // Usamos LoremFlickr que é o mais estável para buscas dinâmicas.
                    // Adicionamos a tag "healthy,food" para garantir que a foto seja de dieta.
                    const searchTerm = encodeURIComponent(foodName.replace(/ /g, ","));
                    const imgUrl = `https://loremflickr.com/320/320/healthy,food,${searchTerm}/all`;

                    htmlContent += `
                        <div class="meal-card">
                            <div class="meal-info">
                                <h4>${mealType}</h4>
                                <h5>${foodName}</h5>
                                <p>${details}</p>
                            </div>
                            <div class="meal-image-container">
                                <img src="${imgUrl}" alt="${foodName}" 
                                     onerror="this.src='https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=300&q=80'">
                            </div>
                        </div>
                    `;
                }

                resultArea.innerHTML = htmlContent;

            } catch (error) {
                resultArea.innerHTML = `<div class="loading-text" style="color:#ff4b2b">Erro ao conectar. Verifique sua chave API.</div>`;
                console.error(error);
            }
        }
    </script>
</body>
</html>
